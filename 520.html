<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAKU Commerce</title>
    <style>
        :root { --orange: #FF6600; --bg: #f5f5f5; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); padding-bottom: 100px; }
        
        /* CABEÇALHO 1 */
        header { background: #fff; padding: 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .top-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .logo { font-weight: 900; color: var(--orange); font-size: 22px; text-transform: uppercase; }
        .search { flex-grow: 1; background: #f0f0f0; border-radius: 20px; padding: 10px 15px; border: none; outline: none; font-size: 14px; }
        .cart-icon { font-size: 24px; position: relative; cursor: pointer; border: none; background: none; color: #333; }
        #cart-count { position: absolute; top: -5px; right: -8px; background: var(--orange); color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 50%; }

        /* CABEÇALHO 2 - CATEGORIAS */
        .categories { display: flex; overflow-x: auto; background: #fff; padding: 12px 10px; gap: 15px; border-bottom: 1px solid #eee; }
        .categories::-webkit-scrollbar { display: none; }
        .categories span { white-space: nowrap; font-size: 14px; font-weight: 500; color: #666; }
        .categories .active { color: #000; border-bottom: 2px solid var(--orange); padding-bottom: 2px; }

        /* GRADE DE PRODUTOS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; }
        .p-name { font-size: 13px; color: #333; height: 35px; overflow: hidden; margin-bottom: 5px; }
        .p-price { color: var(--orange); font-weight: bold; font-size: 16px; }
        .p-old { text-decoration: line-through; color: #999; font-size: 12px; margin-left: 5px; }
        .add-btn { background: #000; color: #fff; border: none; width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; font-size: 13px; }

        /* CARRINHO FLUTUANTE */
        .checkout-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 15px; box-sizing: border-box; border-top: 1px solid #ddd; z-index: 200; }
        .delivery-select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 14px; }
        .total-box { display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        .wa-btn { background: #25D366; color: white; display: block; text-align: center; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        .free-alert { font-size: 12px; color: #2e7d32; font-weight: bold; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <div class="top-row">
        <div class="logo">VAKU</div>
        <input type="text" class="search" placeholder="Pesquisar na VAKU...">
        <button class="cart-icon">🛒<span id="cart-count">0</span></button>
    </div>
</header>

<nav class="categories">
    <span class="active">Tudo</span><span>Mulher</span><span>Homem</span><span>Criança</span><span>Jóias</span><span>Studio</span><span>Electrónica</span><span>Promoção</span><span>Informação</span>
</nav>

<div class="grid">
    <!-- Produto 1 -->
    <div class="card">
        <img src="https://placeholder.com" alt="Produto">
        <div class="info">
            <div class="p-name">Exemplo de Ténis Luxo</div>
            <div class="p-price">15.000 Kz <span class="p-old">22.000 Kz</span></div>
            <button class="add-btn" onclick="add('Ténis Luxo', 15000)">Adicionar</button>
        </div>
    </div>
    <!-- Produto 2 -->
    <div class="card">
        <img src="https://placeholder.com" alt="Produto">
        <div class="info">
            <div class="p-name">Exemplo de Relógio Gold</div>
            <div class="p-price">8.500 Kz <span class="p-old">12.000 Kz</span></div>
            <button class="add-btn" onclick="add('Relógio Gold', 8500)">Adicionar</button>
        </div>
    </div>
</div>

<div class="checkout-bar">
    <div id="msg-gratis" class="free-alert"></div>
    <select id="entrega" class="delivery-select" onchange="atualizar()">
        <option value="2000">Ponto: Mercado do 30 km30 (2.000 Kz)</option>
        <option value="2000">Ponto: Vila de Viana ponte amarela (2.000 Kz)</option>
        <option value="2000">Ponto: Mercado dos Escongoleses (2.000 Kz)</option>
        <option value="2000">Ponto: Triângulo dos Escongoleses (2.000 Kz)</option>
        <option value="2000">Ponto: Hoji Ya henda (2.000 Kz)</option>
        <option value="2000">Ponto: Mercado do Kicolo (2.000 Kz)</option>
        <option value="0">Buscar: Mercado do 30 km30 (Grátis)</option>
        <option value="0">Buscar: Triângulo dos Escongoleses (Grátis)</option>
        <option value="0">Buscar: Hoji Ya henda (Grátis)</option>
    </select>
    <div class="total-box">
        <span>Total:</span>
        <span id="total-txt">0 Kz</span>
    </div>
    <a href="#" class="wa-btn" onclick="enviar()">Finalizar no WhatsApp</a>
</div>

<script>
    let carrinho = [];
    let subtotal = 0;

    function add(nome, preco) {
        carrinho.push({nome, preco});
        subtotal += preco;
        document.getElementById('cart-count').innerText = carrinho.length;
        atualizar();
        alert(nome + " adicionado!");
    }

    function atualizar() {
        let taxa = parseInt(document.getElementById('entrega').value);
        let msg = document.getElementById('msg-gratis');
        
        // Regra: Entrega grátis acima de 20.000 Kz
        if (subtotal >= 20000) {
            taxa = 0;
            msg.innerText = "✨ Ganhou Entrega Gratuita da VAKU!";
        } else {
            msg.innerText = "";
        }

        document.getElementById('total-txt').innerText = (subtotal + taxa).toLocaleString() + " Kz";
    }

    function enviar() {
        if(carrinho.length === 0) return alert("Adicione produtos primeiro!");
        
        let taxa = parseInt(document.getElementById('entrega').value);
        const local = document.getElementById('entrega').options[document.getElementById('entrega').selectedIndex].text;
        if (subtotal >= 20000) taxa = 0;

        let msg = `*VAKU Commerce - NOVO PEDIDO*\n\n`;
        msg += `*Produtos:*\n`;
        carrinho.forEach(i => msg += `- ${i.nome}: ${i.preco.toLocaleString()} Kz\n`);
        msg += `\n*Ponto de Entrega:* ${local}`;
        msg += `\n*Taxa:* ${taxa.toLocaleString()} Kz`;
        msg += `\n*TOTAL A PAGAR:* ${(subtotal + taxa).toLocaleString()} Kz`;
        msg += `\n\n_Pagamento na entrega ou no local da busca._`;

        window.open(`https://wa.me{encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
