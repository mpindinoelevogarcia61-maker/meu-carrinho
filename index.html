<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --temu-orange: #FF6600; }
        body { font-family: sans-serif; margin: 0; background: #fff; overflow: hidden; }
        header { padding: 10px; border-bottom: 1px solid #eee; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .logo { font-weight: 800; color: var(--temu-orange); font-size: 1.2rem; }
        .search-box { flex-grow: 1; background: #eee; border-radius: 20px; padding: 8px 15px; border: none; font-size: 14px; color: #666; }
        .categories { display: flex; overflow-x: auto; padding: 12px 5px; gap: 20px; white-space: nowrap; }
        .categories::-webkit-scrollbar { display: none; }
        .categories span { font-size: 14px; color: #333; font-weight: 500; }
    </style>
</head>
<body>
<header>
    <div class="top-bar">
        <div class="logo">VAKU</div>
        <div class="search-box">Pesquisar na VAKU...</div>
        <div style="font-size: 20px;">🛒</div>
    </div>
</header>
<nav class="categories">
    <span><b>Tudo</b></span><span>Mulher</span><span>Homem</span><span>Criança</span><span>Jóias</span><span>Studio</span><span>Electrónica</span><span>Promoção</span>
</nav>
</body>
</html>
