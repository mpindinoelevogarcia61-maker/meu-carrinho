<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAKU Commerce</title>
    <style>
        :root { --temu-orange: #FF6600; --bg-gray: #f7f7f7; }
        body { font-family: sans-serif; margin: 0; background: var(--bg-gray); padding-bottom: 80px; }

        /* HEADER */
        header { background: #fff; padding: 10px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .logo { font-weight: 800; color: var(--temu-orange); font-size: 1.2rem; }
        .search-box { flex-grow: 1; background: #eee; border-radius: 20px; padding: 8px 15px; border: none; }
        .cart-btn { font-size: 24px; position: relative; cursor: pointer; border: none; background: none; }
        #cart-count { position: absolute; top: -5px; right: -8px; background: var(--temu-orange); color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 50%; }

        /* CATEGORIAS */
        .categories { display: flex; overflow-x: auto; background: #fff; padding: 12px; gap: 20px; border-bottom: 1px solid #eee; }
        .categories::-webkit-scrollbar { display: none; }
        .categories span { white-space: nowrap; font-size: 14px; color: #555; }

        /* GRADE DE PRODUTOS */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .product-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #fff; }
        .product-info { padding: 10px; }
        .sale-price { color: var(--temu-orange); font-weight: bold; font-size: 16px; }
        .add-btn { background: #000; color: #fff; border: none; width: 100%; padding: 10px; border-radius: 20px; margin-top: 8px; font-weight: bold; }

        /* JANELA DO CARRINHO (MODAL) */
        #cart-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 2000; 
        }
        .modal-content { 
            background: #fff; margin: 10% auto; width: 90%; max-height: 80%; 
            border-radius: 15px; padding: 20px; overflow-y: auto; 
        }

        /* BOTÃO FLUTUANTE WHATSAPP */
        .wa-float {
            position: fixed; bottom: 20px; right: 20px; background: #25D366; 
            color: white; width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-decoration: none; z-index: 1500;
        }

        .delivery-section { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        select { width: 100%; padding: 10px; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <div class="logo">VAKU</div>
        <input type="text" class="search-box" placeholder="Pesquisar...">
        <button class="cart-btn" onclick="toggleCart()">🛒<span id="cart-count">0</span></button>
    </div>
</header>

<nav class="categories">
    <span><b>Tudo</b></span><span>Mulher</span><span>Homem</span><span>Criança</span><span>Jóias</span><span>Electrónica</span>
</nav>

<div class="product-grid">
    <!-- Produto 1 -->
    <div class="product-card">
        <img src="https://unsplash.com" class="product-img">
        <div class="product-info">
            <div style="font-size: 13px;">Ténis Sport Red</div>
            <div class="sale-price">15.000 Kz</div>
            <button class="add-btn" onclick="addToCart('Ténis Sport Red', 15000)">Adicionar</button>
        </div>
    </div>
    <!-- Produto 2 -->
    <div class="product-card">
        <img src="https://unsplash.com" class="product-img">
        <div class="product-info">
            <div style="font-size: 13px;">Relógio Silver</div>
            <div class="sale-price">7.500 Kz</div>
            <button class="add-btn" onclick="addToCart('Relógio Silver', 7500)">Adicionar</button>
        </div>
    </div>
</div>

<!-- Janela do Carrinho -->
<div id="cart-modal">
    <div class="modal-content">
        <h3>Seu Carrinho</h3>
        <div id="cart-items">O carrinho está vazio.</div>
        
        <div class="delivery-section">
            <label><b>Onde entregar?</b></label>
            <select id="delivery-option" onchange="updateModalTotal()">
                <option value="2000">Ponto Estratégico (2.000 Kz)</option>
                <option value="0">Vou buscar na loja (Grátis)</option>
            </select>
        </div>

        <div style="margin-top: 20px; font-weight: bold; font-size: 18px;">
            Total: <span id="modal-total">0 Kz</span>
        </div>
        
        <button class="add-btn" style="background: #25D366;" onclick="sendWhatsApp()">Finalizar no WhatsApp</button>
        <button class="add-btn" style="background: #ccc; color: #333;" onclick="toggleCart()">Fechar</button>
    </div>
</div>

<!-- Ícone do WhatsApp -->
<a href="javascript:void(0)" class="wa-float" onclick="toggleCart()">🟢</a>

<script>
    let cart = [];
    let subtotal = 0;

    function addToCart(name, price) {
        cart.push({name, price});
        subtotal += price;
        updateUI();
        alert("Adicionado!");
    }

    function updateUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let itemsDiv = document.getElementById('cart-items');
        if(cart.length > 0) {
            itemsDiv.innerHTML = cart.map(item => `<p>${item.name} - ${item.price} Kz</p>`).join('');
        }
        updateModalTotal();
    }

    function updateModalTotal() {
        let delivery = parseInt(document.getElementById('delivery-option').value);
        // Regra de entrega grátis acima de 20.000 Kz
        if (subtotal >= 20000) delivery = 0;
        
        document.getElementById('modal-total').innerText = (subtotal + delivery).toLocaleString() + " Kz";
    }

    function toggleCart() {
        let modal = document.getElementById('cart-modal');
        modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
    }

    function sendWhatsApp() {
        if(cart.length === 0) return alert("Adicione produtos primeiro!");
        
        let delivery = parseInt(document.getElementById('delivery-option').value);
        if (subtotal >= 20000) delivery = 0;

        let msg = `*VAKU Commerce - Pedido*\n\n`;
        cart.forEach(i => msg += `- ${i.name}\n`);
        msg += `\n*Total com entrega:* ${subtotal + delivery} Kz\n*Pagamento na entrega.*`;

        window.open(`https://wa.me{encodeURIComponent(msg)}`);
    }
</script>

</body>
</html>
